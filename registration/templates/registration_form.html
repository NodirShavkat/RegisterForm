{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card-custom {
            max-width: 700px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            background: white;
        }

        .form-control, .form-select {
            border-radius: 8px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 8px;
            padding: 10px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .logo-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;         
            margin-bottom: 20px;
        }

        .logo-container img {
            flex: 1 1 auto;     
            max-width: 18%;     
            height: auto;       
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .logo-container img {
                max-width: 100px;   /* Kichik ekranlarda rasmlar kichrayadi */
            }
        }

        h2 {
            font-weight: 600;
            margin-bottom: 25px;
        }
        
        .form-label {
            font-weight: 700; /* bold qiladi */
        }
    </style>
</head>
<body>

<div class="card-custom">

    <div class="logo-container">
        <img src="/static/img/icho1.png">
        <img src="/static/img/uzb2.png"> 
    </div>

    <div class="logo-container">
        <img src="/static/img/beruniy3.png">
        <img src="/static/img/AL_KHWARAZMI_2026.png">
        <img src="/static/img/bio5.png">
        <img src="/static/img/GOLD_FOIL6.png">
        <img src="/static/img/AlisherNavoiy7.png">
    </div>

    <h2 class="text-center">Registration Form</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}

        <script>
        document.addEventListener("DOMContentLoaded", function() {
            const experienceRadios = document.querySelectorAll('input[name="has_experience"]');
            const experienceField = document.querySelector('[name="previous_experience"]').closest('.mb-3');

            function toggleExperience() {
                const selected = document.querySelector('input[name="has_experience"]:checked');
                if (selected && selected.value === "True") {
                    experienceField.style.display = "block";
                } else {
                    experienceField.style.display = "none";
                }
            }

            experienceRadios.forEach(radio => {
                radio.addEventListener("change", toggleExperience);
            });

            toggleExperience();
        });
        </script>

        <button type="submit" class="btn btn-primary w-100 mt-3">
            Submit Registration
        </button>

    </form>
</div>

</body>
</html>
